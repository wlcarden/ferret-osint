# === ferret-osint Configuration ===
#
# API keys belong in .env, not here.
# Tool availability is auto-detected at runtime — no manual flags needed.
# Run `python -m osint_agent status` to see which tools are available and why.

# Data directories
storage:
  data_dir: ./data

# Social media settings
social:
  reddit:
    user_agent: "ferret-osint/0.1 (research)"
